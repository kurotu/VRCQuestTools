name: Deploy Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Build]
    types:
      - completed
    branches: [master, latest-docs]
  release:
    types: [published, unpublished]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  listPublishDirectory: Website
  pathToCi: ci

jobs:

  build-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Wait for Latest Release
        run: sleep 10
      - name: Build Package Version Listing
        run: |
          npm install --no-save got@12.5.3
          node scripts/create_index_json.mjs kurotu/VRCQuestTools Packages/com.github.kurotu.vrc-quest-tools/package.json > index.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo
          path: index.json

  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: latest-docs
      - uses: actions/checkout@v4
        with:
          ref: master
          path: current

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      # TODO: use pnpm
      - uses: actions/setup-node@v4
        with:
          cache: 'npm'
          cache-dependency-path: Website/package-lock.json
      - run: cd Website && npm ci

      - name: Generate changelog
        run: |
          ./scripts/generate-changelog-links.sh | cat CHANGELOG.md - > Website/docs/changelog.md
          ./scripts/generate-changelog-links.sh | cat CHANGELOG_JP.md - > Website/i18n/ja/docusaurus-plugin-content-docs/current/changelog.md

      - name: Make versioned docs
        run: cd Website && pnpm run docusaurus docs:version $(jq -r .version ../Packages/com.github.kurotu.vrc-quest-tools/package.json)

      - name: Copy i18n file
        run: |
          VERSION=$(jq -r .version Packages/com.github.kurotu.vrc-quest-tools/package.json)
          cd Website/i18n/ja/docusaurus-plugin-content-docs
          jq --arg version $VERSION '."version.label".message = $version' current.json > version-${VERSION}.json

      - name: Copy current docs
        run: |
          rm -r Website/docs
          cp -r current/Website/docs Website/
          rm -r Website/i18n/ja/docusaurus-plugin-content-docs/current
          cp -r current/Website/i18n/ja/docusaurus-plugin-content-docs/current Website/i18n/ja/docusaurus-plugin-content-docs/

      - name: Copy current static assets
        run: rsync -av --ignore-existing current/Website/static/ Website/static/

      - name: Generate current changelog
        run: |
          ./scripts/generate-changelog-links.sh | cat current/CHANGELOG.md - > Website/docs/changelog.md
          ./scripts/generate-changelog-links.sh | cat current/CHANGELOG_JP.md - > Website/i18n/ja/docusaurus-plugin-content-docs/current/changelog.md

      - run: cd Website && pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: docs
          path: Website/build

  build-latest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Determine version
        id: version
        run: |
          CURRENT_VERSION=$(jq -r .version Packages/com.github.kurotu.vrc-quest-tools/package.json)
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3 | cut -d- -f1)
          NEXT_PATCH=$((PATCH + 1))
          DATE=$(date +%Y%m%d)
          RUN_NUMBER="${GITHUB_RUN_NUMBER}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-master.${DATE}.${RUN_NUMBER}.${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Update package.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE_JSON="Packages/com.github.kurotu.vrc-quest-tools/package.json"
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" "$PACKAGE_JSON"
          sed -i "s|\"url\": \".*\"|\"url\": \"https://kurotu.github.io/VRCQuestTools/com.github.kurotu.vrc-quest-tools-${VERSION}.zip\"|" "$PACKAGE_JSON"
          sed -i "s/string Version = \".*\"/string Version = \"${VERSION}\"/" "Packages/com.github.kurotu.vrc-quest-tools/Editor/VRCQuestTools.cs"
      - name: Create zip package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp README.md Packages/com.github.kurotu.vrc-quest-tools/
          ZIP_NAME="com.github.kurotu.vrc-quest-tools-${VERSION}.zip"
          cd Packages/com.github.kurotu.vrc-quest-tools
          zip -r "../../${ZIP_NAME}" .
      - name: Generate VPM repository JSON
        run: |
          jq -n --slurpfile pkg Packages/com.github.kurotu.vrc-quest-tools/package.json '{
            name: ($pkg[0].displayName + " Latest"),
            author: $pkg[0].author.name,
            packages: {
              ($pkg[0].name): {
                versions: {
                  ($pkg[0].version): $pkg[0]
                }
              }
            }
          }' > latest-index.json
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest
          path: |
            com.github.kurotu.vrc-quest-tools-*.zip
            latest-index.json

  deploy:
    needs: [build-repo, build-docs, build-latest]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: repo
          path: ${{env.listPublishDirectory}}

      - uses: actions/download-artifact@v4
        with:
          name: docs
          path: ${{env.listPublishDirectory}}

      - uses: actions/download-artifact@v4
        with:
          name: latest
          path: ${{env.listPublishDirectory}}

      - name: Setup Pages
        uses: actions/configure-pages@v2

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{env.listPublishDirectory}}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
